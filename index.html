<!DOCTYPE html>

    <style>
        :root {
            --primary: #2c6e9e;
            --primary-dark: #1e4a6e;
            --primary-light: #e8f0fe;
            --secondary: #27ae60;
            --secondary-hover: #1e8449;
            --danger: #e74c3c;
            --warning: #f39c12;
            --bg-body: #f0f4f8;

<script>
    // ========================================================================
    // GLOBAL
    // ========================================================================
    let token = localStorage.getItem('token');
    let currentUser = null;

    function formatNumber(number) {
        if (number === undefined || number === null || isNaN(number)) return '0';
        const num = parseFloat(number);
        return num.toLocaleString('fr-FR').replace(/\s/g, ' ').replace(/,/g, ' ');
    }
async function apiCall(endpoint, method = 'GET', body = null) {
    try {
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const res = await fetch(`/api${endpoint}`, { 
            method, 
            headers, 
            body: body ? JSON.stringify(body) : undefined 
        });
        if (res.status === 401) { 
            logout(); 
            throw new Error('Session expirée'); 
        }
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erreur serveur');
        return data;
    } catch(err) {
        console.error('API Error:', err);
        throw err;
    }
}
// ===== OPTIMISATION RAPIDE =====

// 1. Cache simple
const dataCache = new Map();

async function apiCallCached(endpoint, method = 'GET', body = null, ttl = 30000) {
    const key = `${method}:${endpoint}:${JSON.stringify(body)}`;
    
    if (method === 'GET' && dataCache.has(key)) {
        const cached = dataCache.get(key);
        if (Date.now() - cached.timestamp < ttl) {
            return cached.data;
        }
        dataCache.delete(key);
    }
    
    const data = await apiCall(endpoint, method, body);
    if (method === 'GET') {
        dataCache.set(key, { data, timestamp: Date.now() });
    }
    return data;
}

// 2. Chargement parallèle des données
async function loadPageData(pages) {
    return await Promise.all(pages.map(page => 
        apiCallCached(page.endpoint, 'GET', null, 60000)
    ));
}

// 3. Éviter les re-rendus inutiles
function updateElement(id, content) {
    const el = document.getElementById(id);
    if (el && el.innerHTML !== content) {
        el.innerHTML = content;
    }
}

    window.login = async () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        try {
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            token = data.token;
            currentUser = data.user;
            localStorage.setItem('token', token);
            localStorage.setItem('user', JSON.stringify(currentUser));
            window.location.reload();
        } catch(err) {
            document.getElementById('authMsg').innerText = err.message;
        }
    };

        token = null; localStorage.clear(); currentUser = null;

        if (page === 'dashboard') await renderDashboard();

        else if (page === 'sales') await renderSales();
        else if (page === 'proforma') await renderProforma();
        else if (page === 'invoices') await renderInvoices();
        else if (page === 'clients') await renderClients();
        else if (page === 'cash') await renderCash();
        else if (page === 'inventory') await renderInventory();
        else if (page === 'reports') await renderReports();
        else if (page === 'settings') await renderSettings();
        else if (page === 'history') await renderHistory();

    let selectedImageData = null;

    window.previewImage = function(event) {
        const file = event.target.files[0];
        if (file) {
            if (file.size > 2 * 1024 * 1024) {
                alert('L\'image est trop volumineuse (max 2MB)');
                event.target.value = '';
                return;
            }
            if (!file.type.startsWith('image/')) {
                alert('Veuillez sélectionner une image valide');
                event.target.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageData = e.target.result;
                document.getElementById('imagePreview').src = selectedImageData;
                document.getElementById('imagePreviewContainer').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    };

    window.removeImage = function() {
        selectedImageData = null;
        document.getElementById('imagePreview').src = '';
        document.getElementById('imagePreviewContainer').style.display = 'none';
        document.getElementById('prodImage').value = '';
    };

                document.getElementById('prodCategorySelect').value = '';

                try {
                    const products = await apiCall('/products');
                    const p = products.find(x => x.id == id);
                    if (!p) return alert('Produit non trouvé');
                    document.getElementById('prodId').value = p.id;
                    document.getElementById('prodName').value = p.name;
                    document.getElementById('prodQuantity').value = p.quantity;
                    document.getElementById('prodBarcode').value = p.barcode || '';
                    document.getElementById('prodBuyPrice').value = p.buy_price;
                    document.getElementById('prodSellPrice').value = p.sell_price;
                    document.getElementById('prodUnit').value = p.unit;
                    document.getElementById('prodCategoryName').value = '';
                    document.getElementById('prodCategorySelect').value = p.category_id || '';
                    if (p.image_url) {
                        selectedImageData = p.image_url;
                        document.getElementById('imagePreview').src = p.image_url;
                        document.getElementById('imagePreviewContainer').style.display = 'block';
                    } else {
                        document.getElementById('imagePreview').src = '';
                        document.getElementById('imagePreviewContainer').style.display = 'none';

                    }

                    await apiCall(`/products/${id}`, 'DELETE');

                    const name = document.getElementById('prodName').value.trim();
                    if (!name) return alert('Nom obligatoire');
                    const sell_price = parseFloat(document.getElementById('prodSellPrice').value);
                    if (isNaN(sell_price) || sell_price <= 0) return alert('Prix de vente invalide');

                    let category_id = document.getElementById('prodCategorySelect').value;
                    let category_name = document.getElementById('prodCategoryName').value.trim();
                    if (category_name === '') category_name = null;
                    if (category_id === '') category_id = null;

                    let sku;
                    if (id) {
                        const products = await apiCall('/products');
                        const existing = products.find(p => p.id == id);
                        sku = existing ? existing.sku : 'PROD-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
                    } else {
                        sku = 'PROD-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
                    }

                    const productData = {
                        sku: sku,
                        name: name,
                        sell_price: sell_price,
                        barcode: document.getElementById('prodBarcode').value.trim() || null,
                        description: '',
                        category_id: category_id,
                        category_name: category_name,
                        supplier_id: null,
                        quantity: parseInt(document.getElementById('prodQuantity').value) || 0,
                        unit: document.getElementById('prodUnit').value.trim() || 'pièce',
                        reorder_level: 5,
                        buy_price: parseFloat(document.getElementById('prodBuyPrice').value) || 0,
                        location: '',
                        image_url: selectedImageData || null
                    };

                    try {
                        if (id) {
                            await apiCall(`/products/${id}`, 'PUT', productData);
                            alert('✅ Produit modifié avec succès');
                        } else {
                            await apiCall('/products', 'POST', productData);
                            alert('✅ Produit créé avec succès');
                        }
                        bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
                        searchProducts();
                        if (typeof renderDashboard === 'function') renderDashboard();
                    } catch(err) {
                        alert('❌ Erreur: ' + err.message);
                    }
                });
            }
            await searchProducts();
        } catch(err) { console.error(err); document.getElementById('pageContainer').innerHTML = `<div class="alert alert-danger">Erreur : ${err.message}</div>`; }
    }

                filteredProducts = allProducts.filter(p =>
                    p.name.toLowerCase().includes(searchTerm) ||
                    p.sku.toLowerCase().includes(searchTerm) ||
                    (p.barcode && p.barcode.toLowerCase().includes(searchTerm))
                );
            }
            renderProductGrid(filteredProducts);
        };

        window.addProductToCart = (productId, productName, price, stock) => {
            const existing = cart.find(i => i.product_id === productId);
            if (existing) {
                if (existing.quantity >= stock) {
                    alert(`Stock insuffisant (${stock} disponible)`);
                    return;
                }
                existing.quantity += 1;
                existing.total_price = existing.quantity * existing.unit_price;
            } else {
                cart.push({ product_id: productId, name: productName, quantity: 1, unit_price: price, total_price: price, stock: stock });
            }
            renderCart();
            const cartContainer = document.getElementById('cartList');
            if (cartContainer) cartContainer.classList.add('cart-pulse');
            setTimeout(() => { if (cartContainer) cartContainer.classList.remove('cart-pulse'); }, 300);
        };

        window.selectPayment = function(method) {
            document.querySelectorAll('.payment-logo').forEach(el => el.classList.remove('active'));
            const el = document.getElementById('pay-' + method);
            if (el) el.classList.add('active');
            document.getElementById('paymentMethod').value = method;
        };

        const clientInput = document.getElementById('clientInput');
        const clientSuggestions = document.getElementById('clientSuggestions');
        let selectedClient = null;
        clientInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if (term.length < 2) { clientSuggestions.style.display = 'none'; return; }
            const filtered = clientsList.filter(c => c.name.toLowerCase().includes(term));
            if (!filtered.length) { clientSuggestions.style.display = 'none'; return; }
            clientSuggestions.innerHTML = filtered.map(c => `<div data-id="${c.id}" data-name="${c.name}" data-email="${c.email||''}" data-phone="${c.phone||''}" data-address="${c.address||''}">${c.name}</div>`).join('');
            clientSuggestions.style.display = 'block';
            document.querySelectorAll('#clientSuggestions div').forEach(el => { el.addEventListener('click', () => { selectedClient = { id: parseInt(el.dataset.id), name: el.dataset.name, email: el.dataset.email, phone: el.dataset.phone, address: el.dataset.address }; clientInput.value = el.dataset.name; clientSuggestions.style.display = 'none'; }); });
        });
        document.addEventListener('click', (e) => { if (!clientInput.contains(e.target) && !clientSuggestions.contains(e.target)) clientSuggestions.style.display = 'none'; });

        const barcodeInput = document.getElementById('barcodeInput');
        if (barcodeInput) {
            barcodeInput.addEventListener('change', async (e) => {
                const code = e.target.value.trim();
                if (code.length === 0) return;
                try {
                    const prod = await apiCall(`/products/barcode/${encodeURIComponent(code)}`);
                    addProductToCart(prod.id, prod.name, prod.sell_price, prod.quantity);
                    document.getElementById('productSearch').value = prod.name;
                    filterProducts();
                } catch(err) { alert('Produit non trouvé'); }
                barcodeInput.value = '';
            });
        }

        const deferredCheck = document.getElementById('deferredPayment');
        const deferredFields = document.getElementById('deferredFields');
        if (deferredCheck && deferredFields) {
            deferredCheck.addEventListener('change', () => deferredFields.style.display = deferredCheck.checked ? 'block' : 'none');
        }

        window.renderCart = () => {
            const container = document.getElementById('cartList');
            const countEl = document.getElementById('cartCount');
            let total = 0;
            if (!cart.length) {
                container.innerHTML = '<div class="text-center text-muted-custom py-3"><i class="bi bi-cart"></i> Panier vide</div>';
                document.getElementById('cartTotal').innerText = '0 FCFA';
                if (countEl) countEl.innerText = '0';
                return;
            }
            container.innerHTML = cart.map((item, idx) => {
                total += item.total_price;
                return `<div class="cart-item">
                    <span><strong>${item.name}</strong> × ${item.quantity}</span>
                    <span>${formatNumber(item.total_price)} FCFA</span>
                    <div class="d-flex gap-1">
                        <button class="btn btn-sm btn-outline-secondary" onclick="updateQty(${idx}, -1)"><i class="bi bi-dash"></i></button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="updateQty(${idx}, 1)"><i class="bi bi-plus"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="removeFromCart(${idx})"><i class="bi bi-x"></i></button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('cartTotal').innerText = formatNumber(total) + ' FCFA';
            if (countEl) countEl.innerText = cart.length;
        };

        window.updateQty = (idx, delta) => {
            const newQty = cart[idx].quantity + delta;
            if (newQty < 1) return;
            if (newQty > cart[idx].stock) return alert('Stock insuffisant');
            cart[idx].quantity = newQty;
            cart[idx].total_price = cart[idx].quantity * cart[idx].unit_price;
            renderCart();
        };

        window.removeFromCart = (idx) => {
            cart.splice(idx, 1);
            renderCart();
        };

        window.completeSale = async () => {
            if (cart.length === 0) return alert('Panier vide');
            
            const clientName = clientInput.value.trim();
            let clientData = {};
            if (selectedClient) {
                clientData = { 
                    client_name: selectedClient.name, 
                    client_email: selectedClient.email || '', 
                    client_phone: selectedClient.phone || '', 
                    client_address: selectedClient.address || '' 
                };
            } else if (clientName !== '') {
                clientData = { 
                    client_name: clientName, 
                    client_email: '', 
                    client_phone: '', 
                    client_address: '' 
                };
            } else {
                clientData = { 
                    client_name: '', 
                    client_email: '', 
                    client_phone: '', 
                    client_address: '' 
                };
            }
            
            const remise_pct = parseFloat(document.getElementById('remise_pct').value) || 0;
            const acompte = parseFloat(document.getElementById('acompte').value) || 0;
            const payment_method = document.getElementById('paymentMethod').value || 'cash';
            const isDeferred = document.getElementById('deferredPayment').checked;
            const due_date = isDeferred ? document.getElementById('dueDate').value : null;
            const status = isDeferred ? 'pending' : 'completed';
            
            const items = cart.map(i => ({ 
                product_id: i.product_id, 
                quantity: i.quantity, 
                unit_price: i.unit_price 
            }));

            const requestData = {
                ...clientData,
                items: items,
                remise_pct: remise_pct,
                acompte: acompte,
                payment_method: payment_method,
                status: status,
                due_date: due_date
            };

            console.log('📦 Données envoyées:', requestData);

            try {
                const result = await apiCall('/sales', 'POST', requestData);
                alert(`✅ Vente enregistrée (N° ${result.sale_id}) - ${status === 'pending' ? 'Facture en attente' : 'Payée'}`);
                if (!isDeferred && confirm('Télécharger la facture ?')) {
                    window.open(`/api/sales/${result.sale_id}/invoice?token=${token}`, '_blank');
                }
                cart = [];
                renderCart();
                loadSalesList();
                renderDashboard();
                clientInput.value = '';
                selectedClient = null;
                document.getElementById('productSearch').value = '';
                filterProducts();
            } catch(err) {
                console.error('❌ Erreur complète:', err);
                alert('❌ Erreur : ' + err.message);
            }
        };

        window.filterSales = async () => {
            const client = document.getElementById('filterClient').value;
            const date = document.getElementById('filterDate').value;
            let url = '/sales?';
            if (client) url += `client_name=${encodeURIComponent(client)}&`;
            if (date) url += `start_date=${date}&end_date=${date}`;
            const sales = await apiCall(url);
            renderSalesTable(sales);
        };

        window.loadSalesList = async () => {
            const sales = await apiCall('/sales');
            renderSalesTable(sales);
        };

        function renderSalesTable(sales) {
            const tbody = document.getElementById('salesList');
            if (!tbody) return;
            tbody.innerHTML = sales.slice(0, 50).map(s => `
                <tr>
                    <td><strong>${s.id}</strong></td>
                    <td>${s.client_name || '-'}</td>
                    <td>${formatNumber(s.final_amount)} FCFA</td>
                    <td><span class="badge-status ${s.status === 'completed' ? 'badge-success' : 'badge-warning'}">${s.status === 'completed' ? 'Payée' : 'Impayée'}</span></td>
                    <td>${new Date(s.sale_date).toLocaleString().slice(0, 10)}</td>
                    <td>
                        <button class="btn btn-sm btn-info me-1" onclick="window.open('/api/sales/${s.id}/invoice?token=${token}','_blank')" title="Facture"><i class="bi bi-file-pdf"></i></button>
                        <button class="btn btn-sm btn-primary me-1" onclick="window.open('/api/sales/${s.id}/order?token=${token}','_blank')" title="Bon de commande"><i class="bi bi-clipboard-check"></i></button>
                        <button class="btn btn-sm btn-secondary me-1" onclick="window.open('/api/sales/${s.id}/delivery?token=${token}','_blank')" title="Bordereau de livraison"><i class="bi bi-truck"></i></button>
                        <button class="btn btn-sm btn-warning me-1" onclick="editSale(${s.id})" title="Modifier"><i class="bi bi-pencil"></i></button>
                        ${s.status === 'pending' ? `<button class="btn btn-sm btn-success" onclick="recordPayment(${s.id}, ${s.final_amount})" title="Règlement"><i class="bi bi-cash"></i></button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        window.editSale = async (saleId) => {
            const saleData = await apiCall(`/sales/${saleId}`);
            const sale = saleData.sale;
            const items = saleData.items;
            document.getElementById('editSaleId').innerText = saleId;
            document.getElementById('editRemisePct').value = sale.remise_pct || 0;
            document.getElementById('editAcompte').value = sale.acompte || 0;
            let itemsHtml = '<h6>Articles :</h6><div class="table-wrapper"><table class="table table-sm"><thead><tr><th>Produit</th><th>Quantité</th><th>Prix unit.</th><th>Total</th></tr></thead><tbody>';
            items.forEach(item => { itemsHtml += `<tr><td>${item.product_name}</td><td>${item.quantity}</td><td>${formatNumber(item.unit_price)} FCFA</td><td>${formatNumber(item.total_price)} FCFA</td></tr>`; });
            itemsHtml += '</tbody></table></div>';
            document.getElementById('editSaleItems').innerHTML = itemsHtml;
            new bootstrap.Modal(document.getElementById('editSaleModal')).show();
        };

        window.saveSaleModification = async () => {
            const saleId = document.getElementById('editSaleId').innerText;
            const remise_pct = parseFloat(document.getElementById('editRemisePct').value) || 0;
            const acompte = parseFloat(document.getElementById('editAcompte').value) || 0;
            try {
                await apiCall(`/sales/${saleId}`, 'PUT', { remise_pct, acompte });
                alert('✅ Vente modifiée avec succès');
                bootstrap.Modal.getInstance(document.getElementById('editSaleModal')).hide();
                loadSalesList();
                renderDashboard();
            } catch(err) { alert('❌ Erreur : ' + err.message); }
        };

        window.recordPayment = async (saleId, totalAmount) => {
            let amount = parseFloat(prompt(`Montant à payer (max ${formatNumber(totalAmount)} FCFA) :`, totalAmount));
            if (isNaN(amount) || amount <= 0) return;
            const method = prompt('Mode de paiement (cash, card, transfer) :', 'cash');
            try {
                const result = await apiCall(`/sales/${saleId}/payment`, 'POST', { amount, payment_method: method });
                alert(`✅ Règlement enregistré. Reste à payer : ${formatNumber(result.remaining)} FCFA`);
                loadSalesList();
                if (typeof loadAllInvoices === 'function') loadAllInvoices();
            } catch(err) { alert(err.message); }
        };

        renderProductGrid(allProducts);
        renderCart();
        loadSalesList();
    }

    // ===== AUTRES PAGES =====
    async function renderInvoices() {
        let invoices = [];

        document.getElementById('pageContainer').innerHTML = html;
        window.searchInvoices = async () => {
            const client = document.getElementById('searchClientName').value;
            const date = document.getElementById('searchDate').value;
            let url = '/sales?status=pending';
            if (client) url += `&client_name=${encodeURIComponent(client)}`;
            if (date) url += `&start_date=${date}&end_date=${date}`;

            let html = `<div class="table-wrapper"><table class="table"><thead><tr><th>N°</th><th>Client</th><th>Montant</th><th>Date vente</th><th>Échéance</th><th>Actions</th></tr></thead><tbody>`;
            invoices.forEach(f => { html += `<tr><td>${f.id}</td><td>${f.client_name || 'Client particulier'}</td><td>${formatNumber(f.final_amount)} FCFA</td><td>${new Date(f.sale_date).toLocaleDateString()}</td><td>${f.due_date ? new Date(f.due_date).toLocaleDateString() : '-'}</td><td><button class="btn btn-sm btn-warning" onclick="recordPaymentInvoice(${f.id}, ${f.final_amount})"><i class="bi bi-cash"></i></button> <button class="btn btn-sm btn-info" onclick="window.open('/api/sales/${f.id}/invoice?token=${token}','_blank')"><i class="bi bi-file-pdf"></i></button></td></tr>`; });
            html += '</tbody></table></div>';
            document.getElementById('invoicesList').innerHTML = html;
        };
        window.recordPaymentInvoice = async (saleId, totalAmount) => {
            let amount = parseFloat(prompt(`Montant à payer (max ${formatNumber(totalAmount)} FCFA) :`, totalAmount));
            if (isNaN(amount) || amount <= 0) return;
            const method = prompt('Mode de paiement (cash, card, transfer) :', 'cash');
            try { const result = await apiCall(`/sales/${saleId}/payment`, 'POST', { amount, payment_method: method }); alert(`✅ Règlement enregistré. Reste à payer : ${formatNumber(result.remaining)} FCFA`); searchInvoices(); } catch(err) { alert(err.message); }
        };
        await loadAllInvoices();
    }

    async function renderProforma() {
        let proformas = [];
        const html = `
            <button class="btn btn-primary mb-3" onclick="showProformaModal()"><i class="bi bi-plus-circle me-1"></i>Nouvelle facture proforma</button>
            <div class="card-modern"><div class="table-wrapper"><table class="table"><thead><tr><th>N°</th><th>Client</th><th>Date</th><th>Total</th><th>Statut</th><th>Actions</th></tr></thead><tbody id="proformaList"></tbody></table></div></div>
            <div class="modal fade" id="proformaModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5><i class="bi bi-file-text me-2"></i>Nouvelle facture proforma</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="row"><div class="col-md-6"><label class="form-label">Client</label><input type="text" id="proformaClient" class="form-control mb-2"><label class="form-label">Email</label><input type="email" id="proformaEmail" class="form-control mb-2"><label class="form-label">Téléphone</label><input type="text" id="proformaPhone" class="form-control mb-2"><label class="form-label">Adresse</label><textarea id="proformaAddress" class="form-control mb-2" rows="2"></textarea><label class="form-label">Valable jusqu'au</label><input type="date" id="proformaValidUntil" class="form-control mb-2"></div><div class="col-md-6"><label class="form-label">Remise (%)</label><input type="number" id="proformaRemisePct" class="form-control" value="0" step="0.01"><label class="form-label">Acompte (FCFA)</label><input type="number" id="proformaAcompte" class="form-control" value="0" step="0.01"><label class="form-label">Notes</label><textarea id="proformaNotes" class="form-control" rows="2"></textarea></div></div><hr><h6>Articles</h6><div id="proformaItemsList"></div><button class="btn btn-secondary btn-sm mt-2" onclick="addProformaItem()"><i class="bi bi-plus"></i> Ajouter article</button></div><div class="modal-footer"><button class="btn btn-success" onclick="saveProforma()"><i class="bi bi-save me-1"></i>Enregistrer</button><button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button></div></div></div></div>
        `;
        document.getElementById('pageContainer').innerHTML = html;
        let items = [];
        window.addProformaItem = () => {
            const idx = items.length;
            const itemHtml = `<div class="row g-2 mb-2" id="item-${idx}"><div class="col-md-5"><input type="text" class="form-control" placeholder="Description" id="desc-${idx}"></div><div class="col-md-2"><input type="number" class="form-control" placeholder="Qté" id="qty-${idx}" value="1"></div><div class="col-md-3"><input type="number" step="0.01" class="form-control" placeholder="Prix unit." id="price-${idx}"></div><div class="col-md-2"><button class="btn btn-danger btn-sm" onclick="removeProformaItem(${idx})"><i class="bi bi-trash"></i></button></div></div>`;
            document.getElementById('proformaItemsList').insertAdjacentHTML('beforeend', itemHtml);
            items.push(idx);
        };
        window.removeProformaItem = (idx) => { document.getElementById(`item-${idx}`)?.remove(); items = items.filter(i => i !== idx); };
        window.saveProforma = async () => {
            const client_name = document.getElementById('proformaClient').value;
            const client_email = document.getElementById('proformaEmail').value;
            const client_phone = document.getElementById('proformaPhone').value;
            const client_address = document.getElementById('proformaAddress').value;
            const valid_until = document.getElementById('proformaValidUntil').value;
            const remise_pct = parseFloat(document.getElementById('proformaRemisePct').value) || 0;
            const acompte = parseFloat(document.getElementById('proformaAcompte').value) || 0;
            const notes = document.getElementById('proformaNotes').value;
            const articleItems = [];
            for (let i of items) {
                const desc = document.getElementById(`desc-${i}`).value;
                const qty = parseFloat(document.getElementById(`qty-${i}`).value);
                const price = parseFloat(document.getElementById(`price-${i}`).value);
                if (desc && qty > 0 && price > 0) articleItems.push({ description: desc, quantity: qty, unit_price: price });
            }
            if (articleItems.length === 0) return alert('Ajoutez au moins un article');
            try {
                await apiCall('/proforma', 'POST', { client_name, client_email, client_phone, client_address, items: articleItems, remise_pct, acompte, valid_until, notes });
                alert('✅ Proforma créée');
                bootstrap.Modal.getInstance(document.getElementById('proformaModal')).hide();
                loadProformas();
            } catch(err) { alert('❌ Erreur : ' + err.message); }
        };
        window.showProformaModal = () => { document.getElementById('proformaItemsList').innerHTML = ''; items = []; addProformaItem(); document.getElementById('proformaRemisePct').value = 0; document.getElementById('proformaAcompte').value = 0; new bootstrap.Modal(document.getElementById('proformaModal')).show(); };
        async function loadProformas() {
            proformas = await apiCall('/proforma');
            document.getElementById('proformaList').innerHTML = proformas.map(p => `
                <tr><td>${p.proforma_number}</td><td>${p.client_name || '-'}</td><td>${new Date(p.issue_date).toLocaleDateString()}</td><td>${formatNumber(p.total)} FCFA</td><td><span class="badge ${p.status==='draft'?'badge-warning':'badge-success'}">${p.status}</span></td>
                <td><button class="btn btn-sm btn-info me-1" onclick="window.open('/api/proforma/${p.id}/pdf?token=${token}','_blank')"><i class="bi bi-file-pdf"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="deleteProforma(${p.id})"><i class="bi bi-trash"></i></button></td></tr>
            `).join('');
        }
        window.deleteProforma = async (id) => { if(confirm('Supprimer cette proforma ?')) { await apiCall(`/proforma/${id}`, 'DELETE'); loadProformas(); } };
        loadProformas();
    }

        window.deleteClient = async (id) => { if(confirm('Supprimer ?')) { await apiCall(`/clients/${id}`, 'DELETE'); renderClients(); } };
    }

                    <div><span class="badge ${cashSession.isOpen ? 'badge-success' : 'badge-warning'} p-2">${cashSession.isOpen ? '🟢 Ouverte' : '🔴 Fermée'}</span></div>
                </div>
                <div class="cash-stats mb-4">
                    <div class="cash-stat-item"><div class="label">Solde actuel</div><div class="amount green">${formatNumber(summary.balance)} FCFA</div></div>

                    <div class="cash-stat-item"><div class="label">Sorties totales</div><div class="amount red">${formatNumber(summary.expenses)} FCFA</div></div>
                    <div class="cash-stat-item"><div class="label">Session</div><div class="amount">${cashSession.isOpen ? formatNumber(cashSession.openingBalance) + ' FCFA' : '---'}</div></div>
                </div>
                <div class="row g-2 mb-4">
                    <div class="col-md-3"><button class="btn btn-success w-100" onclick="openCash()" ${cashSession.isOpen ? 'disabled' : ''}><i class="bi bi-unlock me-1"></i> Ouvrir</button></div>
                    <div class="col-md-3"><button class="btn btn-danger w-100" onclick="closeCash()" ${!cashSession.isOpen ? 'disabled' : ''}><i class="bi bi-lock me-1"></i> Fermer</button></div>
                    <div class="col-md-3"><button class="btn btn-warning w-100" onclick="addCashTransaction('deposit')"><i class="bi bi-plus-circle me-1"></i> Dépôt</button></div>
                    <div class="col-md-3"><button class="btn btn-danger w-100" onclick="addCashTransaction('withdrawal')"><i class="bi bi-dash-circle me-1"></i> Retrait</button></div>
                </div>
                <ul class="nav nav-tabs mb-3"><li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#operations">Opérations</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#balance">Résumé</button></li></ul>
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="operations"><div class="table-wrapper"><table class="table"><thead><tr><th>Type</th><th>Montant</th><th>Description</th><th>Date</th></tr></thead><tbody>${transactions.map(t => `<tr><td><span class="badge ${t.transaction_type==='sale'||t.transaction_type==='deposit'?'badge-success':'badge-danger'}">${t.transaction_type}</span></td><td>${formatNumber(t.amount)} FCFA</td><td>${t.description || ''}</td><td>${new Date(t.created_at).toLocaleString()}</td></tr>`).join('')}</tbody></table></div></div>
                    <div class="tab-pane fade" id="balance"><div class="card p-3"><h6>Résumé de la caisse</h6><table class="table"><tr><th>Entrées totales</th><td>${formatNumber(summary.entries)} FCFA</td></tr><tr><th>Sorties totales</th><td>${formatNumber(summary.expenses)} FCFA</td></tr><tr class="table-success"><th>Solde</th><td><strong>${formatNumber(summary.balance)} FCFA</strong></td></tr>${cashSession.isOpen ? `<tr><th>Fonds de caisse</th><td>${formatNumber(cashSession.openingBalance)} FCFA</td></tr>` : ''}</table></div></div>
                </div>
            </div>
        `;
        document.getElementById('pageContainer').innerHTML = html;
    }

    window.openCash = () => {
        const amount = parseFloat(prompt('Montant du fonds de caisse initial (FCFA) :', '0'));
        if (isNaN(amount) || amount < 0) return alert('Montant invalide');
        const cashSession = { isOpen: true, openingBalance: amount, openingTime: new Date().toISOString() };
        localStorage.setItem('cashSession', JSON.stringify(cashSession));
        renderCash();
        alert('✅ Caisse ouverte avec ' + formatNumber(amount) + ' FCFA');
    };

    window.closeCash = async () => {
        const savedSession = localStorage.getItem('cashSession');
        if (!savedSession) return alert('La caisse est déjà fermée');
        const cashSession = JSON.parse(savedSession);
        const summary = await apiCall('/cash-register/summary');
        const diff = summary.balance - cashSession.openingBalance;
        const msg = `📊 Bilan de la caisse\nFonds initial : ${formatNumber(cashSession.openingBalance)} FCFA\nSolde actuel : ${formatNumber(summary.balance)} FCFA\nDifférence : ${diff >= 0 ? '+' : ''}${formatNumber(diff)} FCFA\n\nVoulez-vous fermer la caisse ?`;
        if (confirm(msg)) {
            localStorage.removeItem('cashSession');
            renderCash();
            alert('🔒 Caisse fermée');
        }
    };

    window.addCashTransaction = async (type) => {
        const savedSession = localStorage.getItem('cashSession');
        if (!savedSession) return alert('⚠️ Veuillez ouvrir la caisse d\'abord');
        const amount = parseFloat(prompt(`Montant (FCFA) pour ${type} :`));
        if (isNaN(amount) || amount <= 0) return alert('Montant invalide');
        const desc = prompt('Description :');
        try {
            await apiCall('/cash-register', 'POST', { transaction_type: type, amount, description: desc });
            renderCash();
            alert('✅ Transaction enregistrée');
        } catch(err) { alert('❌ Erreur : ' + err.message); }
    };

    async function renderInventory() {
        const movements = await apiCall('/inventory/movements');
        const products = await apiCall('/products');
        const html = `
            <div class="row g-3 mb-3">
                <div class="col-md-6"><div class="card-modern"><h6><i class="bi bi-arrow-up-down me-2"></i>Ajuster stock</h6><select id="adjustProduct" class="form-select mb-2">${products.map(p=>`<option value="${p.id}">${p.name} (actuel:${p.quantity})</option>`)}</select><input type="number" id="newQty" class="form-control mb-2" placeholder="Nouvelle quantité"><button class="btn btn-warning" onclick="adjustStock()"><i class="bi bi-check me-1"></i>Appliquer</button></div></div>
                <div class="col-md-6"><div class="card-modern"><h6><i class="bi bi-archive me-2"></i>Inventaire global</h6><button class="btn btn-primary" onclick="showGlobalInventory()"><i class="bi bi-eye me-1"></i>Voir inventaire complet</button></div></div>
            </div>
            <div class="table-wrapper"><table class="table"><thead><tr><th>Produit</th><th>Type</th><th>Variation</th><th>Avant→Après</th><th>Date</th></tr></thead><tbody>${movements.map(m=>`<tr><td><strong>${m.product_name}</strong></td><td><span class="badge ${m.type==='sale'?'badge-warning':m.type==='purchase'?'badge-success':'badge-info'}">${m.type}</span></td><td>${m.quantity_change}</td><td>${m.quantity_before}→${m.quantity_after}</td><td>${new Date(m.created_at).toLocaleString()}</td></tr>`).join('')}</tbody></table></div>`;
        document.getElementById('pageContainer').innerHTML = html;
        window.adjustStock = async () => { const product_id = document.getElementById('adjustProduct').value; const new_quantity = parseInt(document.getElementById('newQty').value); if(!product_id || isNaN(new_quantity)) return alert('Données invalides'); await apiCall('/inventory/adjust', 'POST', { product_id, new_quantity, reason: 'Ajustement manuel' }); renderInventory(); };
        window.showGlobalInventory = async () => {
            const inventory = await apiCall('/inventory/global');
            let html = '<div class="modal fade" id="inventoryModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5><i class="bi bi-archive me-2"></i>Inventaire complet</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="table-wrapper"><table class="table"><thead><tr><th>SKU</th><th>Produit</th><th>Quantité</th><th>Unité</th><th>Seuil</th></tr></thead><tbody>';
            inventory.forEach(p => { html += `<tr><td>${p.sku}</td><td>${p.name}</td><td>${p.quantity}</td><td>${p.unit}</td><td>${p.reorder_level}</td></tr>`; });
            html += '</tbody></table></div></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button></div></div></div></div>';
            document.body.insertAdjacentHTML('beforeend', html);
            new bootstrap.Modal(document.getElementById('inventoryModal')).show();
            document.getElementById('inventoryModal').addEventListener('hidden.bs.modal', () => document.getElementById('inventoryModal').remove());
        };
    }

    async function renderReports() {
        const salesData = await apiCall('/reports/sales-by-period?period=month');
        const html = `<div class="card-modern"><h5><i class="bi bi-graph-up me-2"></i>Évolution des ventes</h5><canvas id="salesChart" height="200"></canvas></div>`;
        document.getElementById('pageContainer').innerHTML = html;
        const ctx = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: salesData.map(d => d.date),
                datasets: [{ label: 'Ventes (FCFA)', data: salesData.map(d => d.total), borderColor: '#2c6e9e', tension: 0.3, fill: true, backgroundColor: 'rgba(44,110,158,0.05)' }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }
// ===== PARAMÈTRES (CORRIGÉ) =====
async function renderSettings() {
    try {
        const settings = await apiCall('/settings');
        const html = `
            <div class="card-modern">
                <h5><i class="bi bi-gear me-2"></i>Paramètres société</h5>
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">Nom entreprise</label><input id="companyName" class="form-control" value="${settings.company_name || ''}"></div>
                    <div class="col-md-6"><label class="form-label">Sous-titre</label><input id="companySubtitle" class="form-control" value="${settings.company_subtitle || ''}"></div>
                    <div class="col-12"><label class="form-label">Activité</label><textarea id="companyActivity" class="form-control" rows="2">${settings.company_activity || ''}</textarea></div>
                    <div class="col-md-6"><label class="form-label">Numéro RC</label><input id="companyRc" class="form-control" value="${settings.company_rc || ''}"></div>
                    <div class="col-md-6"><label class="form-label">Adresse</label><input id="companyAddress" class="form-control" value="${settings.company_address || ''}"></div>
                    <div class="col-md-4"><label class="form-label">Téléphone principal</label><input id="companyPhone" class="form-control" value="${settings.company_phone || ''}"></div>
                    <div class="col-md-4"><label class="form-label">Téléphone secondaire</label><input id="companyPhone2" class="form-control" value="${settings.company_phone2 || ''}"></div>
                    <div class="col-md-4"><label class="form-label">Email</label><input id="companyEmail" class="form-control" value="${settings.company_email || ''}"></div>
                    <div class="col-md-6"><label class="form-label">URL du logo</label><input id="logoUrl" class="form-control" value="${settings.logo_url || ''}" placeholder="https://exemple.com/logo.png"></div>
                    <div class="col-md-3"><label class="form-label">Taux TVA (%)</label><input id="taxRate" class="form-control" value="${settings.tax_rate || 20}"></div>
                    <div class="col-md-3"><label class="form-label">Seuil stock bas</label><input id="lowStockAlert" class="form-control" value="${settings.low_stock_alert || 5}"></div>
                    <div class="col-md-3"><label class="form-label">Devise</label><input id="currency" class="form-control" value="${settings.currency || 'FCFA'}"></div>
                    <div class="col-12"><button class="btn btn-primary" id="saveSettingsBtn"><i class="bi bi-save me-1"></i>Enregistrer</button></div>
                </div>
            </div>
        `;
        document.getElementById('pageContainer').innerHTML = html;
        
        // Fonction saveSettings - CORRIGÉE avec vérification des éléments
        window.saveSettings = async function() {
            try {
                // Vérification que tous les éléments existent
                const getVal = (id) => {
                    const el = document.getElementById(id);
                    return el ? el.value : '';
                };
                
                const data = {
                    company_name: getVal('companyName'),
                    company_subtitle: getVal('companySubtitle'),
                    company_activity: getVal('companyActivity'),
                    company_rc: getVal('companyRc'),
                    company_address: getVal('companyAddress'),
                    company_phone: getVal('companyPhone'),
                    company_phone2: getVal('companyPhone2'),
                    company_email: getVal('companyEmail'),
                    logo_url: getVal('logoUrl'),
                    tax_rate: parseFloat(getVal('taxRate')) || 20,
                    low_stock_alert: parseInt(getVal('lowStockAlert')) || 5,
                    currency: getVal('currency') || 'FCFA'
                };
                await apiCall('/settings', 'PUT', data);
                alert('✅ Paramètres mis à jour');
                renderSettings();
            } catch(err) {
                alert('❌ Erreur : ' + err.message);
            }
        };
        
        // Écouteur d'événement pour le bouton avec vérification
        const saveBtn = document.getElementById('saveSettingsBtn');
        if (saveBtn) {
            // Supprimer les anciens écouteurs
            const newBtn = saveBtn.cloneNode(true);
            saveBtn.parentNode.replaceChild(newBtn, saveBtn);
            newBtn.addEventListener('click', window.saveSettings);
        }
    } catch(err) {
        console.error('Erreur renderSettings:', err);
        document.getElementById('pageContainer').innerHTML = `<div class="alert alert-danger">Erreur chargement paramètres : ${err.message}</div>`;
    }
}
   
    async function renderHistory() {
        const history = await apiCall('/history');
        const html = `<div class="table-wrapper"><table class="table"><thead><tr><th>Type</th><th>Référence</th><th>Montant</th><th>Date</th></tr></thead><tbody>${history.map(h=>`<tr><td><span class="badge ${h.type==='sale'?'badge-success':'badge-info'}">${h.type}</span></td><td>${h.client_name || h.product_name || h.id}</td><td>${h.amount ? formatNumber(h.amount) + ' FCFA' : ''}</td><td>${new Date(h.date).toLocaleString()}</td></tr>`).join('')}</tbody></table></div>`;
        document.getElementById('pageContainer').innerHTML = html;
    }

    // ========================================================================
    // INIT
    // ========================================================================
    if (token && localStorage.getItem('user')) {
        currentUser = JSON.parse(localStorage.getItem('user'));
        showApp();

    }
