<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GestPro | Gestion Professionnelle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c6e9e;
            --primary-dark: #1e4a6e;
            --primary-light: #e8f0fe;
            --secondary: #27ae60;
            --secondary-hover: #1e8449;
            --danger: #e74c3c;
            --warning: #f39c12;
            --bg-body: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #1a2a3a;
            --text-muted: #6b7a8a;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
            --radius: 1.25rem;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-body);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
        }
        .sidebar {
            position: fixed; top: 0; left: 0; height: 100%; width: 270px;
            background: var(--card-bg); transition: 0.3s; z-index: 1000;
            box-shadow: 2px 0 20px rgba(0,0,0,0.04);
            border-right: 1px solid rgba(0,0,0,0.04);
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .sidebar .brand { padding: 24px 24px 16px; border-bottom: 1px solid rgba(0,0,0,0.04); }
        .sidebar .brand h4 { font-weight: 700; color: var(--primary); font-size: 1.4rem; }
        .sidebar .brand h4 i { margin-right: 10px; }
        .sidebar .nav-link {
            color: #5a6b7e; padding: 12px 20px; margin: 4px 14px;
            border-radius: 0.9rem; transition: var(--transition);
            font-weight: 500; display: flex; align-items: center; gap: 14px;
            font-size: 0.9rem;
        }
        .sidebar .nav-link i { font-size: 1.2rem; width: 24px; text-align: center; }
        .sidebar .nav-link:hover { background: var(--primary-light); color: var(--primary); transform: translateX(4px); }
        .sidebar .nav-link.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(44,110,158,0.3); }
        .sidebar .nav-link.logout { color: var(--danger); }
        .sidebar .nav-link.logout:hover { background: #fde8e8; }
        .sidebar .nav-divider { margin: 12px 20px; border-color: rgba(0,0,0,0.04); }
        .content {
            margin-left: 270px;
            padding: 28px 36px;
            min-height: 100vh;
        }
        .navbar-top {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 28px;
            margin-bottom: 32px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-top h3 { font-weight: 700; font-size: 1.5rem; color: var(--text-main); margin: 0; }
        .navbar-top .user-info { display: flex; align-items: center; gap: 12px; }
        .navbar-top .user-info span { font-weight: 600; }
        .navbar-top .user-info i {
            font-size: 1.8rem; color: var(--primary);
            background: var(--primary-light); padding: 6px; border-radius: 50%;
        }
        .stat-card {
            background: var(--card-bg); border-radius: var(--radius); padding: 1.5rem;
            box-shadow: var(--shadow); transition: var(--transition);
            border: 1px solid rgba(0,0,0,0.04); border-top: 4px solid var(--primary);
            position: relative; overflow: hidden;
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
        .stat-card .stat-icon { font-size: 2rem; color: var(--primary); opacity: 0.6; margin-bottom: 8px; }
        .stat-card h6 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 0.25rem; }
        .stat-card h2 { font-size: 1.8rem; font-weight: 700; margin: 0; color: var(--primary); }
        .stat-card .stat-label { font-size: 0.8rem; color: var(--text-muted); }
        .stat-card .stat-link { color: var(--primary); text-decoration: none; font-size: 0.8rem; font-weight: 500; }
        .stat-card .stat-link:hover { text-decoration: underline; }
        .stat-card.green { border-top-color: var(--secondary); }
        .stat-card.green h2 { color: var(--secondary); }
        .stat-card.orange { border-top-color: var(--warning); }
        .stat-card.orange h2 { color: var(--warning); }
        .stat-card.red { border-top-color: var(--danger); }
        .stat-card.red h2 { color: var(--danger); }
        .table-wrapper {
            background: var(--card-bg); border-radius: var(--radius);
            overflow: auto; box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04);
        }
        .table-wrapper .table { margin-bottom: 0; }
        .table thead th {
            background: #f8fafc; color: var(--primary); font-weight: 600;
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 14px 16px; border-bottom: 2px solid rgba(0,0,0,0.04);
        }
        .table tbody td { padding: 12px 16px; vertical-align: middle; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 0.85rem; }
        .table tbody tr { transition: var(--transition); }
        .table tbody tr:hover { background: var(--primary-light); }
        .table .badge-status { padding: 4px 14px; border-radius: 2rem; font-size: 0.7rem; font-weight: 600; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .btn { border-radius: 2rem !important; font-weight: 500; padding: 8px 24px !important; transition: var(--transition); font-size: 0.85rem; }
        .btn-primary { background: var(--primary); border: none; color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(44,110,158,0.3); }
        .btn-success { background: var(--secondary); border: none; }
        .btn-success:hover { background: var(--secondary-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(39,174,96,0.3); }
        .btn-danger { background: var(--danger); border: none; }
        .btn-danger:hover { background: #c0392b; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(231,76,60,0.3); }
        .btn-warning { background: var(--warning); border: none; color: white; }
        .btn-warning:hover { background: #d68910; transform: translateY(-2px); }
        .btn-outline-secondary { border-color: #dce1e6; color: var(--text-muted); }
        .btn-outline-secondary:hover { background: #f8fafc; border-color: var(--primary); color: var(--primary); }
        .btn-sm { padding: 4px 14px !important; font-size: 0.75rem; }

        .sales-layout { display: flex; gap: 20px; height: calc(100vh - 280px); min-height: 500px; }
        .sales-products { flex: 1; overflow-y: auto; padding-right: 10px; }
        .sales-cart {
            width: 420px; min-width: 350px; background: var(--card-bg);
            border-radius: var(--radius); box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04); padding: 16px;
            display: flex; flex-direction: column; max-height: 100%;
        }
        .sales-cart .cart-header { border-bottom: 2px solid var(--primary-light); padding-bottom: 10px; margin-bottom: 10px; flex-shrink: 0; }
        .sales-cart .cart-items { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        .sales-cart .cart-items::-webkit-scrollbar { width: 4px; }
        .sales-cart .cart-items::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .sales-cart .cart-footer { border-top: 2px solid var(--primary-light); padding-top: 10px; flex-shrink: 0; }
        .sales-cart .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #f8fafc; padding: 6px 10px; margin-bottom: 4px;
            border-radius: 0.75rem; transition: var(--transition);
            border: 1px solid transparent; font-size: 0.8rem;
        }
        .sales-cart .cart-item:hover { border-color: rgba(44,110,158,0.1); background: var(--primary-light); }
        .cart-item .item-name { flex: 1; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cart-item .item-qty { display: flex; align-items: center; gap: 4px; margin: 0 8px; }
        .cart-item .item-qty button {
            background: none; border: none; width: 20px; height: 20px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--primary); cursor: pointer; transition: var(--transition);
            font-size: 0.7rem;
        }
        .cart-item .item-qty button:hover { background: var(--primary-light); }
        .cart-item .item-qty span { min-width: 20px; text-align: center; font-weight: 600; }
        .cart-item .item-price { font-weight: 600; color: var(--primary); min-width: 70px; text-align: right; font-size: 0.8rem; }
        .cart-item .item-remove { color: var(--danger); cursor: pointer; padding: 0 4px; font-size: 1rem; transition: var(--transition); }
        .cart-item .item-remove:hover { transform: scale(1.2); }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            padding: 4px 2px;
        }
        .product-grid::-webkit-scrollbar { width: 4px; }
        .product-grid::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .product-card {
            background: var(--card-bg); border-radius: var(--radius); padding: 10px 6px;
            text-align: center; cursor: pointer; transition: var(--transition);
            border: 2px solid transparent; box-shadow: var(--shadow);
            position: relative; overflow: hidden;
        }
        .product-card:hover { transform: translateY(-4px) scale(1.02); border-color: var(--primary); box-shadow: var(--shadow-hover); }
        .product-card:active { transform: scale(0.95); }
        .product-card .product-image {
            width: 60px; height: 60px; border-radius: 50%; object-fit: cover;
            margin: 0 auto 4px; background: var(--primary-light);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: var(--primary); border: 2px solid #e9ecef;
        }
        .product-card .product-image img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .product-card .product-name { font-weight: 600; font-size: 0.75rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .product-card .product-price { font-weight: 700; color: var(--primary); font-size: 0.8rem; }
        .product-card .product-stock { font-size: 0.6rem; color: var(--text-muted); }
        .product-card .stock-low { color: var(--danger); font-weight: 600; }
        .product-card .badge-stock {
            position: absolute; top: 4px; right: 4px;
            font-size: 0.5rem; padding: 2px 6px; border-radius: 2rem;
        }
        .badge-stock.out-of-stock { background: var(--danger); color: white; }
        .badge-stock.low-stock { background: var(--warning); color: white; }
        .badge-stock.in-stock { background: var(--secondary); color: white; }
        .product-card .wholesale-badge {
            position: absolute; bottom: 4px; left: 4px;
            font-size: 0.5rem; padding: 2px 6px; border-radius: 2rem;
            background: #8e44ad; color: white;
        }

        input, select, textarea {
            border-radius: 2rem !important;
            border: 1px solid #dee2e6 !important;
            padding: 8px 16px !important;
            background: white;
            transition: var(--transition);
            font-size: 0.85rem;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px rgba(44,110,158,0.1) !important;
            outline: none;
        }
        .form-label { font-weight: 600; font-size: 0.8rem; color: var(--text-main); margin-bottom: 4px; }
        .card-modern {
            background: var(--card-bg); border-radius: var(--radius);
            padding: 1.25rem; box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04); transition: var(--transition);
        }
        .card-modern:hover { box-shadow: var(--shadow-hover); }
        .card-modern .card-title { font-weight: 700; font-size: 1rem; margin-bottom: 0.75rem; }

        .payment-logos { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .payment-logo {
            display: flex; align-items: center; gap: 4px;
            padding: 4px 10px; border-radius: 2rem;
            font-size: 0.7rem; font-weight: 600; cursor: pointer;
            transition: var(--transition); border: 2px solid transparent;
        }
        .payment-logo:hover { transform: scale(1.05); box-shadow: var(--shadow-hover); }
        .payment-logo.active { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
        .payment-logo.cash { background: #f1c40f; color: #2c3e50; }
        .payment-logo.wave { background: #2ecc71; color: white; }
        .payment-logo.orange { background: #e67e22; color: white; }
        .payment-logo .logo-icon { font-size: 1rem; }

        .client-suggestion {
            position: absolute; top: 100%; left: 0; right: 0;
            background: white; border-radius: 1rem;
            box-shadow: var(--shadow-hover); max-height: 200px;
            overflow-y: auto; z-index: 1000;
            border: 1px solid rgba(0,0,0,0.04); margin-top: 4px;
        }
        .client-suggestion div {
            padding: 8px 16px; cursor: pointer; transition: var(--transition);
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        .client-suggestion div:hover { background: var(--primary-light); color: var(--primary); }

        .toggle-sidebar {
            display: none; position: fixed; bottom: 24px; right: 24px;
            z-index: 1100; background: var(--primary); border-radius: 60px;
            width: 54px; height: 54px; text-align: center; line-height: 54px;
            color: white; cursor: pointer; box-shadow: 0 8px 30px rgba(44,110,158,0.3);
            font-size: 1.5rem; transition: var(--transition);
        }
        .toggle-sidebar:hover { transform: scale(1.05); }

        @media (max-width: 1200px) { .sales-cart { width: 340px; min-width: 280px; } }
        @media (max-width: 992px) {
            .sales-layout { flex-direction: column; height: auto; }
            .sales-cart { width: 100%; max-height: 500px; min-height: 300px; }
            .sales-products { max-height: 500px; }
        }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .content { margin-left: 0; padding: 16px; }
            .toggle-sidebar { display: block; }
            .navbar-top { flex-direction: column; gap: 8px; text-align: center; }
            .stat-card h2 { font-size: 1.4rem; }
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .product-card .product-image { width: 50px; height: 50px; font-size: 1.3rem; }
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeInUp 0.4s ease-out forwards; }
        .delay-1 { animation-delay: 0.05s; }
        .delay-2 { animation-delay: 0.1s; }
        .delay-3 { animation-delay: 0.15s; }
        .delay-4 { animation-delay: 0.2s; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .text-primary-custom { color: var(--primary); }
        .bg-primary-light { background: var(--primary-light); }
        .fw-600 { font-weight: 600; }
        .fs-small { font-size: 0.8rem; }
        .text-muted-custom { color: var(--text-muted); }
        @keyframes cartPulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .cart-pulse { animation: cartPulse 0.3s ease-in-out; }
        .barcode-input { position: relative; }
        .barcode-input input { padding-right: 50px !important; }
        .barcode-input .barcode-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.2rem; }
        .barcode-scan-flash { animation: flashGreen 0.5s ease; }
        @keyframes flashGreen { 0% { background-color: rgba(39, 174, 96, 0.3); } 100% { background-color: transparent; } }
        .wholesale-toggle { cursor: pointer; font-size: 0.8rem; }
        .wholesale-toggle.active { color: var(--primary); font-weight: 600; }
        .wholesale-prices { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }
        .wholesale-prices span { display: block; }
        .price-normal { color: var(--primary); }
        .price-wholesale { color: #8e44ad; font-weight: 600; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="brand">
        <h4><i class="bi bi-box-seam"></i> GestPro</h4>
        <span class="text-muted-custom fs-small">Gestion professionnelle</span>
    </div>
    <nav class="nav flex-column mt-2">
        <a class="nav-link active" data-page="dashboard"><i class="bi bi-speedometer2" style="color: #2c6e9e;"></i> Tableau de bord</a>

</div>

<div class="toggle-sidebar" id="toggleSidebar"><i class="bi bi-list"></i></div>

<div class="content" id="mainContent">
    <div class="navbar-top">
        <h3 id="pageTitle">Tableau de bord</h3>
        <div class="user-info">
            <span id="userName"></span>
            <i class="bi bi-person-circle"></i>
        </div>
    </div>
    <div id="pageContainer">Chargement...</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ========================================================================
// GLOBAL
// ========================================================================
let token = localStorage.getItem('token');
let currentUser = null;

function formatNumber(number) {
    if (number === undefined || number === null || isNaN(number)) return '0';
    const num = parseFloat(number);
    return num.toLocaleString('fr-FR').replace(/\s/g, ' ').replace(/,/g, ' ');
}
async function apiCall(endpoint, method = 'GET', body = null) {
    try {
        const headers = { 
            'Content-Type': 'application/json',
            'Cache-Control': 'no-cache, no-store, must-revalidate',
            'Pragma': 'no-cache',
            'Expires': '0'
        };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        
        // ✅ Ajouter un timestamp pour éviter le cache
        let url = `/api${endpoint}`;
        if (method === 'GET' && !url.includes('_t=')) {
            url += (url.includes('?') ? '&' : '?') + '_t=' + Date.now();
        }
        
        const res = await fetch(url, { 
            method, 
            headers, 
            body: body ? JSON.stringify(body) : undefined 
        });
        if (res.status === 401) { 
            logout(); 
            throw new Error('Session expirée'); 
        }
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erreur serveur');
        return data;
    } catch(err) {
        console.error('API Error:', err);
        throw err;
    }
}
// ========================================================================
// AUTH
// ========================================================================
function showAuthPage() {
    document.getElementById('mainContent').innerHTML = `
        <div class="row justify-content-center mt-5">
            <div class="col-md-5">
                <div class="card shadow-lg border-0 p-4" style="border-radius: 48px;">
                    <h3 class="text-center mb-4 text-primary-custom"><i class="bi bi-box-seam"></i> GestPro</h3>
                    <div class="tab-content mt-3">
                        <div class="tab-pane active">
                            <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email">
                            <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Mot de passe">
                            <button class="btn btn-primary w-100 py-2" onclick="login()">Se connecter</button>
                        </div>
                    </div>
                    <div id="authMsg" class="text-danger small mt-3 text-center"></div>
                </div>
            </div>
        </div>`;
}

window.login = async () => {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    try {
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        token = data.token;
        currentUser = data.user;
        localStorage.setItem('token', token);
        localStorage.setItem('user', JSON.stringify(currentUser));
        window.location.reload();
    } catch(err) {
        document.getElementById('authMsg').innerText = err.message;
    }
};

function logout() {
    token = null; localStorage.clear(); currentUser = null;
    showAuthPage();
}
document.getElementById('logoutBtn')?.addEventListener('click', logout);
document.getElementById('toggleSidebar')?.addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

async function loadPage(page) {
    const titles = {
        dashboard: 'Tableau de bord', products: 'Produits', sales: 'Ventes',
        proforma: 'Factures Proforma', invoices: 'Factures clients', clients: 'Clients',
        cash: 'Caisse', inventory: 'Inventaire', reports: 'Rapports',
        settings: 'Paramètres', history: 'Historique'
    };
    document.getElementById('pageTitle').innerText = titles[page] || page;
    if (page === 'dashboard') await renderDashboard();
    else if (page === 'products') await renderProducts();
    else if (page === 'sales') await renderSales();
    else if (page === 'proforma') await renderProforma();
    else if (page === 'invoices') await renderInvoices();
    else if (page === 'clients') await renderClients();
    else if (page === 'cash') await renderCash();
    else if (page === 'inventory') await renderInventory();
    else if (page === 'reports') await renderReports();
    else if (page === 'settings') await renderSettings();
    else if (page === 'history') await renderHistory();
    else if (page === 'sub-users') await renderSubUsers();
}

let selectedImageData = null;

window.previewImage = function(event) {
    const file = event.target.files[0];
    if (file) {
        if (file.size > 2 * 1024 * 1024) {
            alert('L\'image est trop volumineuse (max 2MB)');
            event.target.value = '';
            return;
        }
        if (!file.type.startsWith('image/')) {
            alert('Veuillez sélectionner une image valide');
            event.target.value = '';
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            selectedImageData = e.target.result;
            document.getElementById('imagePreview').src = selectedImageData;
            document.getElementById('imagePreviewContainer').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
};

window.showSubUserModal = function(userId = null) {
    const modal = new bootstrap.Modal(document.getElementById('subUserModal'));
    document.getElementById('subUserModalTitle').innerText = userId ? 'Modifier l\'employé' : 'Nouvel employé';
    document.getElementById('editSubUserId').value = userId || '';
    
    // Exemples de noms sénégalais
    const senegaleseNames = ['Fatou Diop', 'Moussa Ndiaye', 'Aminata Sow', 'Ibrahima Fall', 'Oumou Diallo', 'Cheikh Mbaye'];
    const randomName = senegaleseNames[Math.floor(Math.random() * senegaleseNames.length)];
    
    if (userId) {
        apiCall(`/sub-users/${userId}/permissions`).then(perms => {
            document.getElementById('subUserPassword').placeholder = 'Laisser vide pour ne pas modifier';
            document.getElementById('subUserPassword').value = '';
            
            perms.forEach(p => {
                const checkbox = document.getElementById(`perm_${p.id}`);
                if (checkbox) checkbox.checked = p.has_permission === 1;
            });
        });
        
        // Récupérer les infos de l'utilisateur
        apiCall('/sub-users').then(users => {
            const user = users.find(u => u.id === userId);
            if (user) {
                document.getElementById('subUserName').value = user.name;
                document.getElementById('subUserEmail').value = user.email;
                document.getElementById('subUserStatus').value = user.is_active ? '1' : '0';
            }
        });
    } else {
        document.getElementById('subUserName').value = randomName;
        document.getElementById('subUserEmail').value = '';
        document.getElementById('subUserPassword').value = '';
        document.getElementById('subUserPassword').placeholder = 'Min 6 caractères';
        document.getElementById('subUserStatus').value = '1';
        document.querySelectorAll('#subUserModal .form-check-input').forEach(cb => cb.checked = false);
        
        // Sélectionner quelques permissions par défaut pour l'exemple
        setTimeout(() => {
            const defaultPerms = ['dashboard', 'products_view', 'sales_view', 'clients_view', 'invoices_view'];
            document.querySelectorAll('#subUserModal .form-check-input').forEach(cb => {
                const perm = window.currentPermissions.find(p => p.id === parseInt(cb.value));
                if (perm && defaultPerms.includes(perm.name)) {
                    cb.checked = true;
                }
            });
        }, 100);
    }
    
    modal.show();
};

window.editSubUser = async function(id) {
    try {
        const users = await apiCall('/sub-users');
        const found = users.find(u => u.id === id);
        if (!found) return alert('Utilisateur non trouvé');
        
        document.getElementById('editSubUserId').value = id;
        document.getElementById('subUserName').value = found.name;
        document.getElementById('subUserEmail').value = found.email;
        document.getElementById('subUserStatus').value = found.is_active ? '1' : '0';
        document.getElementById('subUserPassword').value = '';
        document.getElementById('subUserPassword').placeholder = 'Laisser vide pour ne pas modifier';
        
        const perms = await apiCall(`/sub-users/${id}/permissions`);
        perms.forEach(p => {
            const checkbox = document.getElementById(`perm_${p.id}`);
            if (checkbox) checkbox.checked = p.has_permission === 1;
        });
        
        document.getElementById('subUserModalTitle').innerText = 'Modifier l\'employé';
        new bootstrap.Modal(document.getElementById('subUserModal')).show();
    } catch(err) {
        alert('Erreur: ' + err.message);
    }
};

window.saveSubUser = async function() {
    try {
        const id = document.getElementById('editSubUserId').value;
        const name = document.getElementById('subUserName').value.trim();
        const email = document.getElementById('subUserEmail').value.trim();
        const password = document.getElementById('subUserPassword').value;
        const is_active = document.getElementById('subUserStatus').value === '1';
        
        if (!name || !email) {
            return alert('❌ Nom et email sont obligatoires');
        }
        
        if (!id && (!password || password.length < 6)) {
            return alert('❌ Mot de passe requis (min 6 caractères)');
        }
        
        const selectedPermissions = [];
        document.querySelectorAll('#subUserModal .form-check-input:checked').forEach(cb => {
            selectedPermissions.push(parseInt(cb.value));
        });
        
        const data = { name, email, permissions: selectedPermissions, is_active };
        if (password) data.password = password;
        
        if (id) {
            await apiCall(`/sub-users/${id}`, 'PUT', data);
            alert('✅ Employé modifié avec succès');
        } else {
            await apiCall('/sub-users', 'POST', data);
            alert('✅ Employé créé avec succès !\n\n📧 Email: ' + email + '\n🔒 Mot de passe: ' + password);
        }
        
        bootstrap.Modal.getInstance(document.getElementById('subUserModal')).hide();
        renderSubUsers();
    } catch(err) {
        alert('❌ Erreur: ' + err.message);
    }
};

window.deleteSubUser = async function(id) {
    if (!confirm('⚠️ Supprimer définitivement cet employé ?')) return;
    try {
        await apiCall(`/sub-users/${id}`, 'DELETE');
        alert('✅ Employé supprimé');
        renderSubUsers();
    } catch(err) {
        alert('❌ Erreur: ' + err.message);
    }
};

// ===== DÉSACTIVATION DU CACHE =====
async function apiCall(endpoint, method = 'GET', body = null) {
    try {
        const headers = { 
            'Content-Type': 'application/json',
            'Cache-Control': 'no-cache, no-store, must-revalidate',
            'Pragma': 'no-cache',
            'Expires': '0'
        };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        
        // Ajouter un timestamp pour éviter le cache
        let url = `/api${endpoint}`;
        if (method === 'GET') {
            const separator = url.includes('?') ? '&' : '?';
            url += separator + '_t=' + Date.now();
        }
        
        const res = await fetch(url, { 
            method, 
            headers, 
            body: body ? JSON.stringify(body) : undefined 
        });
        if (res.status === 401) { 
            logout(); 
            throw new Error('Session expirée'); 
        }
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erreur serveur');
        return data;
    } catch(err) {
        console.error('API Error:', err);
        throw err;
    }
}

window.editProduct = async function(id) {
    const numericId = parseInt(id);
    if (isNaN(numericId)) {
        alert('❌ ID de produit invalide');
        return;
    }
    
    try {
        // ✅ Forcer le rechargement des produits avec paramètre anti-cache
        const products = await apiCall('/products?_t=' + Date.now());
        console.log('🔍 Recherche du produit ID:', numericId);
        console.log('📦 Produits disponibles:', products.map(p => ({id: p.id, name: p.name})));
        
        // ✅ Comparaison stricte en nombre
        const p = products.find(x => parseInt(x.id) === numericId);
        if (!p) {
            alert(`❌ Produit non trouvé (ID: ${numericId})`);
            console.error('❌ Produit introuvable. Liste des IDs:', products.map(x => x.id));
            return;
        }
        
        console.log('✅ Produit trouvé:', p);
        
        // Remplir le formulaire
        document.getElementById('prodId').value = p.id;
        document.getElementById('prodName').value = p.name;
        document.getElementById('prodQuantity').value = p.quantity;
        document.getElementById('prodBarcode').value = p.barcode || '';
        document.getElementById('prodBuyPrice').value = p.buy_price;
        document.getElementById('prodSellPrice').value = p.sell_price;
        document.getElementById('prodWholesalePrice').value = p.wholesale_price || 0;
        document.getElementById('prodWholesaleQty').value = p.wholesale_quantity || 5;
        document.getElementById('prodUnit').value = p.unit;
        document.getElementById('prodCategoryName').value = '';
        document.getElementById('prodCategorySelect').value = p.category_id || '';
        
        if (p.image_url) {
            selectedImageData = p.image_url;
            document.getElementById('imagePreview').src = p.image_url;
            document.getElementById('imagePreviewContainer').style.display = 'block';
        } else {
            document.getElementById('imagePreview').src = '';
            document.getElementById('imagePreviewContainer').style.display = 'none';
            selectedImageData = null;
        }
        
        new bootstrap.Modal(document.getElementById('productModal')).show();
        
    } catch(e) {
        alert('❌ Erreur chargement: ' + e.message);
        console.error(e);
    }
};

window.deleteProduct = async (id) => {
    const numericId = parseInt(id);
    if (isNaN(numericId)) {
        alert('ID invalide');
        return;
    }
    
    // ✅ Vérifier d'abord que le produit existe
    try {
        const products = await apiCall('/products?_t=' + Date.now());
        const product = products.find(p => parseInt(p.id) === numericId);
        if (!product) {
            alert('❌ Ce produit n\'existe plus. Rafraîchissez la page.');
            searchProducts();
            return;
        }
        
        if (!confirm(`Supprimer définitivement "${product.name}" ?`)) return;
        
        await apiCall(`/products/${numericId}`, 'DELETE');
        alert('✅ Produit supprimé');
        searchProducts();
        renderDashboard();
    } catch(err) {
        alert('❌ Erreur: ' + err.message);
    }
};

window.filterProducts = () => {
    const searchTerm = document.getElementById('productSearch').value.toLowerCase().trim();
    // ✅ Utiliser allProducts (déjà chargé) avec rechargement forcé
    if (!searchTerm) {
        filteredProducts = [...allProducts];
    } else {
        filteredProducts = allProducts.filter(p =>
            p.name.toLowerCase().includes(searchTerm) ||
            p.sku.toLowerCase().includes(searchTerm) ||
            (p.barcode && p.barcode.toLowerCase().includes(searchTerm))
        );
    }
    renderProductGrid(filteredProducts);
};
    window.addProductToCart = (productId, productName, sellPrice, stock, wholesalePrice = 0, wholesaleQty = 5) => {
        const existing = cart.find(i => i.product_id === productId);
        const useWholesale = isWholesaleMode && wholesalePrice > 0;
        const unitPrice = useWholesale ? wholesalePrice : sellPrice;
        
        if (existing) {
            let maxQty = stock;
            if (useWholesale) {
                // En mode gros, on ajoute par lot de wholesaleQty
                maxQty = Math.floor(stock / wholesaleQty) * wholesaleQty;
                if (existing.quantity >= maxQty) {
                    alert(`Stock insuffisant (${maxQty} disponibles en lots de ${wholesaleQty})`);
                    return;
                }
                existing.quantity += wholesaleQty;
                existing.total_price = existing.quantity * existing.unit_price;
            } else {
                if (existing.quantity >= stock) {
                    alert(`Stock insuffisant (${stock} disponible)`);
                    return;
                }
                existing.quantity += 1;
                existing.total_price = existing.quantity * existing.unit_price;
            }
        } else {
            let qty = useWholesale ? wholesaleQty : 1;
            if (qty > stock) {
                alert(`Stock insuffisant (${stock} disponible)`);
                return;
            }
            cart.push({ 
                product_id: productId, 
                name: productName, 
                quantity: qty, 
                unit_price: unitPrice, 
                total_price: qty * unitPrice, 
                stock: stock,
                isWholesale: useWholesale
            });
        }
        renderCart();
        const cartContainer = document.getElementById('cartList');
        if (cartContainer) cartContainer.classList.add('cart-pulse');
        setTimeout(() => { if (cartContainer) cartContainer.classList.remove('cart-pulse'); }, 300);
    };

    window.selectPayment = function(method) {
        document.querySelectorAll('.payment-logo').forEach(el => el.classList.remove('active'));
        const el = document.getElementById('pay-' + method);
        if (el) el.classList.add('active');
        document.getElementById('paymentMethod').value = method;
    };

    const clientInput = document.getElementById('clientInput');
    const clientSuggestions = document.getElementById('clientSuggestions');
    let selectedClient = null;
    clientInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        if (term.length < 2) { clientSuggestions.style.display = 'none'; return; }
        const filtered = clientsList.filter(c => c.name.toLowerCase().includes(term));
        if (!filtered.length) { clientSuggestions.style.display = 'none'; return; }
        clientSuggestions.innerHTML = filtered.map(c => `<div data-id="${c.id}" data-name="${c.name}" data-email="${c.email||''}" data-phone="${c.phone||''}" data-address="${c.address||''}">${c.name}</div>`).join('');
        clientSuggestions.style.display = 'block';
        document.querySelectorAll('#clientSuggestions div').forEach(el => { el.addEventListener('click', () => { selectedClient = { id: parseInt(el.dataset.id), name: el.dataset.name, email: el.dataset.email, phone: el.dataset.phone, address: el.dataset.address }; clientInput.value = el.dataset.name; clientSuggestions.style.display = 'none'; }); });
    });
    document.addEventListener('click', (e) => { if (!clientInput.contains(e.target) && !clientSuggestions.contains(e.target)) clientSuggestions.style.display = 'none'; });

    const deferredCheck = document.getElementById('deferredPayment');
    const deferredFields = document.getElementById('deferredFields');
    if (deferredCheck && deferredFields) {
        deferredCheck.addEventListener('change', () => deferredFields.style.display = deferredCheck.checked ? 'block' : 'none');
    }

    window.renderCart = () => {
        const container = document.getElementById('cartList');
        const countEl = document.getElementById('cartCount');
        let total = 0;
        if (!cart.length) {
            container.innerHTML = '<div class="text-center text-muted-custom py-4"><i class="bi bi-cart" style="font-size:2rem;"></i><p class="mb-0">Panier vide</p></div>';
            document.getElementById('cartTotal').innerText = '0 FCFA';
            if (countEl) countEl.innerText = '0';
            return;
        }
        container.innerHTML = cart.map((item, idx) => {
            total += item.total_price;
            return `
                <div class="cart-item">
                    <span class="item-name" title="${item.name}">${item.name}${item.isWholesale ? ' 📦' : ''}</span>
                    <div class="item-qty">
                        <button onclick="updateQty(${idx}, -1)"><i class="bi bi-dash"></i></button>
                        <span>${item.quantity}</span>
                        <button onclick="updateQty(${idx}, 1)"><i class="bi bi-plus"></i></button>
                    </div>
                    <span class="item-price">${formatNumber(item.total_price)}</span>
                    <span class="item-remove" onclick="removeFromCart(${idx})"><i class="bi bi-x-circle"></i></span>
                </div>
            `;
        }).join('');
        document.getElementById('cartTotal').innerText = formatNumber(total) + ' FCFA';
        if (countEl) countEl.innerText = cart.length;
    };

    window.updateQty = (idx, delta) => {
        const item = cart[idx];
        const newQty = item.quantity + delta;
        if (newQty < 1) return;
        if (newQty > item.stock) return alert('Stock insuffisant');
        item.quantity = newQty;
        item.total_price = item.quantity * item.unit_price;
        renderCart();
    };

    window.removeFromCart = (idx) => {
        cart.splice(idx, 1);
        renderCart();
    };

    window.completeSale = async () => {
        if (cart.length === 0) return alert('Panier vide');
        
        const clientName = clientInput.value.trim();
        let clientData = {};
        if (selectedClient) {
            clientData = { 
                client_name: selectedClient.name, 
                client_email: selectedClient.email || '', 
                client_phone: selectedClient.phone || '', 
                client_address: selectedClient.address || '' 
            };
        } else if (clientName !== '') {
            clientData = { 
                client_name: clientName, 
                client_email: '', 
                client_phone: '', 
                client_address: '' 
            };
        }
        
        const remise_pct = parseFloat(document.getElementById('remise_pct').value) || 0;
        const acompte = parseFloat(document.getElementById('acompte').value) || 0;
        const payment_method = document.getElementById('paymentMethod').value || 'cash';
        const isDeferred = document.getElementById('deferredPayment').checked;
        const due_date = isDeferred ? document.getElementById('dueDate').value : null;
        const status = isDeferred ? 'pending' : 'completed';
        
        const items = cart.map(i => ({ 
            product_id: i.product_id, 
            quantity: i.quantity, 
            unit_price: i.unit_price 
        }));

        const requestData = {
            ...clientData,
            items: items,
            remise_pct: remise_pct,
            acompte: acompte,
            payment_method: payment_method,
            status: status,
            due_date: due_date,
            is_wholesale: isWholesaleMode
        };

        try {
            const result = await apiCall('/sales', 'POST', requestData);
            alert(`✅ Vente enregistrée (N° ${result.sale_id}) - ${status === 'pending' ? 'Facture en attente' : 'Payée'}`);
            if (!isDeferred && confirm('Télécharger la facture ?')) {
                window.open(`/api/sales/${result.sale_id}/invoice?token=${token}`, '_blank');
            }
            cart = [];
            renderCart();
            loadSalesList();
            renderDashboard();
            clientInput.value = '';
            selectedClient = null;
            document.getElementById('productSearch').value = '';
            document.getElementById('barcodeScan').value = '';
            document.getElementById('barcodeScan').focus();
            filterProducts();
        } catch(err) {
            console.error('❌ Erreur:', err);
            alert('❌ Erreur : ' + err.message);
        }
    };

    window.loadSalesList = async () => {
        const sales = await apiCall('/sales');
        renderSalesTable(sales);
    };

    window.filterSales = async () => {
        const client = document.getElementById('filterClient')?.value || '';
        const date = document.getElementById('filterDate')?.value || '';
        let url = '/sales?';
        if (client) url += `client_name=${encodeURIComponent(client)}&`;
        if (date) url += `start_date=${date}&end_date=${date}`;
        const sales = await apiCall(url);
        renderSalesTable(sales);
    };
function renderSalesTable(sales) {
    const tbody = document.getElementById('salesList');
    if (!tbody) return;
    
    if (!sales || sales.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">Aucune vente trouvée</td></tr>';
        return;
    }
    
    tbody.innerHTML = sales.slice(0, 50).map(s => {
        // ✅ Correction : utiliser s au lieu de c
        const clientName = s.client_name || '-';
        const statusClass = s.status === 'completed' ? 'badge-success' : 'badge-warning';
        const statusLabel = s.status === 'completed' ? 'Payée' : 'Impayée';
        const saleDate = new Date(s.sale_date).toLocaleString().slice(0, 10);
        
        return `
            <tr>
                <td><strong>${s.id}</strong></td>
                <td>${clientName}</td>
                <td>${formatNumber(s.final_amount)} FCFA</td>
                <td><span class="badge-status ${statusClass}">${statusLabel}</span></td>
                <td>${saleDate}</td>
                <td>
                    <button class="btn btn-sm btn-info me-1" onclick="window.open('/api/sales/${s.id}/invoice?token=${token}','_blank')" title="Facture">
                        <i class="bi bi-file-pdf"></i>
                    </button>
                    <button class="btn btn-sm btn-primary me-1" onclick="window.open('/api/sales/${s.id}/order?token=${token}','_blank')" title="Bon de commande">
                        <i class="bi bi-clipboard-check"></i>
                    </button>
                    <button class="btn btn-sm btn-secondary me-1" onclick="window.open('/api/sales/${s.id}/delivery?token=${token}','_blank')" title="Bordereau">
                        <i class="bi bi-truck"></i>
                    </button>
                    <button class="btn btn-sm btn-warning me-1" onclick="editSale(${s.id})" title="Modifier">
                        <i class="bi bi-pencil"></i>
                    </button>
                    ${s.status === 'pending' ? `<button class="btn btn-sm btn-success" onclick="recordPayment(${s.id})" title="Règlement"><i class="bi bi-cash"></i></button>` : ''}
                </td>
            </tr>
        `;
    }).join('');
}
    // ✅ PAIEMENT DES FACTURES CORRIGÉ
    window.recordPayment = async (saleId) => {
        try {
            // Récupérer les infos de la vente
            const saleData = await apiCall(`/sales/${saleId}`);
            const sale = saleData.sale;
            const totalAmount = sale.final_amount;
            
            // Récupérer le montant déjà payé
            const totalPaid = saleData.payments.reduce((sum, p) => sum + parseFloat(p.amount), 0);
            const remaining = totalAmount - totalPaid;
            
            if (remaining <= 0) {
                alert('✅ Cette facture est déjà entièrement payée');
                loadSalesList();
                return;
            }
            
            let amount = parseFloat(prompt(`Montant à payer (max ${formatNumber(remaining)} FCFA) :`, remaining));
            if (isNaN(amount) || amount <= 0) return;
            if (amount > remaining) {
                alert(`Montant trop élevé. Maximum: ${formatNumber(remaining)} FCFA`);
                return;
            }
            
            const method = prompt('Mode de paiement (cash, wave, orange) :', 'cash');
            
            const result = await apiCall(`/sales/${saleId}/payment`, 'POST', { 
                amount: amount, 
                payment_method: method || 'cash' 
            });
            
            alert(`✅ Règlement enregistré. Reste à payer : ${formatNumber(result.remaining)} FCFA`);
            loadSalesList();
            renderDashboard();
            if (typeof loadAllInvoices === 'function') loadAllInvoices();
        } catch(err) {
            alert('❌ Erreur: ' + err.message);
        }
    };

    window.editSale = async (saleId) => {
        const saleData = await apiCall(`/sales/${saleId}`);
        const sale = saleData.sale;
        const items = saleData.items;
        document.getElementById('editSaleId').innerText = saleId;
        document.getElementById('editRemisePct').value = sale.remise_pct || 0;
        document.getElementById('editAcompte').value = sale.acompte || 0;
        let itemsHtml = '<h6>Articles :</h6><div class="table-wrapper"><table class="table table-sm"><thead><tr><th>Produit</th><th>Quantité</th><th>Prix unit.</th><th>Total</th></tr></thead><tbody>';
        items.forEach(item => { itemsHtml += `<tr><td>${item.product_name}</td><td>${item.quantity}</td><td>${formatNumber(item.unit_price)} FCFA</td><td>${formatNumber(item.total_price)} FCFA</td></tr>`; });
        itemsHtml += '</tbody></table></div>';
        document.getElementById('editSaleItems').innerHTML = itemsHtml;
        new bootstrap.Modal(document.getElementById('editSaleModal')).show();
    };

    window.saveSaleModification = async () => {
        const saleId = document.getElementById('editSaleId').innerText;
        const remise_pct = parseFloat(document.getElementById('editRemisePct').value) || 0;
        const acompte = parseFloat(document.getElementById('editAcompte').value) || 0;
        try {
            await apiCall(`/sales/${saleId}`, 'PUT', { remise_pct, acompte });
            alert('✅ Vente modifiée avec succès');
            bootstrap.Modal.getInstance(document.getElementById('editSaleModal')).hide();
            loadSalesList();
            renderDashboard();
        } catch(err) { alert('❌ Erreur : ' + err.message); }
    };

    const historyHtml = `
        <div class="card-modern mt-3">
            <h6 class="card-title"><i class="bi bi-clock-history text-primary-custom me-2"></i>Historique ventes</h6>
            <div class="row g-2 mb-3">
                <div class="col-md-5"><input type="text" id="filterClient" class="form-control form-control-sm" placeholder="Filtrer par client"></div>
                <div class="col-md-4"><input type="date" id="filterDate" class="form-control form-control-sm"></div>
                <div class="col-md-3">
                    <button class="btn btn-sm btn-primary w-100" onclick="filterSales()"><i class="bi bi-search"></i> Rechercher</button>
                </div>
            </div>
            <div class="table-wrapper"><table class="table table-sm"><thead><tr><th>#</th><th>Client</th><th>Total</th><th>Statut</th><th>Date</th><th>Actions</th></tr></thead><tbody id="salesList"></tbody></table></div>
        </div>
    `;

    document.getElementById('pageContainer').insertAdjacentHTML('beforeend', historyHtml);

    renderProductGrid(allProducts);
    renderCart();
    loadSalesList();

    setTimeout(() => {
        const scanInput = document.getElementById('barcodeScan');
        if (scanInput) scanInput.focus();
    }, 300);
}

            const totalPaid = saleData.payments.reduce((sum, p) => sum + parseFloat(p.amount), 0);

            if (remaining <= 0) {
                alert('✅ Cette facture est déjà entièrement payée');
                searchInvoices();

            }
            
            let amount = parseFloat(prompt(`Montant à payer (max ${formatNumber(remaining)} FCFA) :`, remaining));

                alert(`Montant trop élevé. Maximum: ${formatNumber(remaining)} FCFA`);

}

async function renderProforma() {
    let proformas = [];
    const html = `
        <button class="btn btn-primary mb-3" onclick="showProformaModal()"><i class="bi bi-plus-circle me-1"></i>Nouvelle facture proforma</button>

    `;

    window.addProformaItem = () => {
        const idx = items.length;

        items.push(idx);
    };
    window.removeProformaItem = (idx) => { document.getElementById(`item-${idx}`)?.remove(); items = items.filter(i => i !== idx); };
    window.saveProforma = async () => {
        const client_name = document.getElementById('proformaClient').value;
        const client_email = document.getElementById('proformaEmail').value;
        const client_phone = document.getElementById('proformaPhone').value;
        const client_address = document.getElementById('proformaAddress').value;

        const notes = document.getElementById('proformaNotes').value;

            const qty = parseFloat(document.getElementById(`qty-${i}`).value);
            const price = parseFloat(document.getElementById(`price-${i}`).value);
            if (desc && qty > 0 && price > 0) articleItems.push({ description: desc, quantity: qty, unit_price: price });
        }
        if (articleItems.length === 0) return alert('Ajoutez au moins un article');

            <td><button class="btn btn-sm btn-info me-1" onclick="window.open('/api/proforma/${p.id}/pdf?token=${token}','_blank')"><i class="bi bi-file-pdf"></i></button>
                <button class="btn btn-sm btn-danger" onclick="deleteProforma(${p.id})"><i class="bi bi-trash"></i></button></td></tr>
        `).join('');
    }
    window.deleteProforma = async (id) => { if(confirm('Supprimer cette proforma ?')) { await apiCall(`/proforma/${id}`, 'DELETE'); loadProformas(); } };
    loadProformas();
}

async function renderClients() {
    const clients = await apiCall('/clients');

window.openCash = () => {
    const amount = parseFloat(prompt('Montant du fonds de caisse initial (FCFA) :', '0'));
    if (isNaN(amount) || amount < 0) return alert('Montant invalide');
    const cashSession = { isOpen: true, openingBalance: amount, openingTime: new Date().toISOString() };
    localStorage.setItem('cashSession', JSON.stringify(cashSession));
    renderCash();
    alert('✅ Caisse ouverte avec ' + formatNumber(amount) + ' FCFA');
};

window.closeCash = async () => {
    const savedSession = localStorage.getItem('cashSession');
    if (!savedSession) return alert('La caisse est déjà fermée');
    const cashSession = JSON.parse(savedSession);
    const summary = await apiCall('/cash-register/summary');
    const diff = summary.balance - cashSession.openingBalance;
    const msg = `📊 Bilan de la caisse\nFonds initial : ${formatNumber(cashSession.openingBalance)} FCFA\nSolde actuel : ${formatNumber(summary.balance)} FCFA\nDifférence : ${diff >= 0 ? '+' : ''}${formatNumber(diff)} FCFA\n\nVoulez-vous fermer la caisse ?`;
    if (confirm(msg)) {
        localStorage.removeItem('cashSession');
        renderCash();
        alert('🔒 Caisse fermée');
    }
};

window.addCashTransaction = async (type) => {
    const savedSession = localStorage.getItem('cashSession');
    if (!savedSession) return alert('⚠️ Veuillez ouvrir la caisse d\'abord');
    const amount = parseFloat(prompt(`Montant (FCFA) pour ${type} :`));
    if (isNaN(amount) || amount <= 0) return alert('Montant invalide');
    const desc = prompt('Description :');
    try {
        await apiCall('/cash-register', 'POST', { transaction_type: type, amount, description: desc });
        renderCash();
        alert('✅ Transaction enregistrée');
    } catch(err) { alert('❌ Erreur : ' + err.message); }
};

        const html = `
            <div class="modal fade" id="clientOperationsModal" tabindex="-1">
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5><i class="bi bi-wallet2 me-2"></i>Opérations - ${clientInfo?.name || 'Client'}</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="row g-3 mb-3">
                                <div class="col-md-4">
                                    <div class="card p-2 text-center">
                                        <small class="text-muted">Solde disponible</small>
                                        <h4 class="text-success">${formatNumber(data.balance)} FCFA</h4>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="card p-2 text-center">
                                        <small class="text-muted">Dette</small>
                                        <h4 class="text-danger">${formatNumber(data.debt)} FCFA</h4>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="card p-2 text-center">
                                        <small class="text-muted">Opérations</small>
                                        <h4>${data.operations.length}</h4>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="d-flex gap-2 mb-3">
                                <button class="btn btn-success btn-sm" onclick="addClientDeposit(${clientId})">
                                    <i class="bi bi-plus-circle"></i> Dépôt
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="addClientWithdrawal(${clientId})">
                                    <i class="bi bi-dash-circle"></i> Retrait
                                </button>
                                <button class="btn btn-warning btn-sm" onclick="payClientInvoice(${clientId})">
                                    <i class="bi bi-receipt"></i> Payer facture
                                </button>
                            </div>
                            
                            <div class="table-wrapper">
                                <table class="table table-sm">
                                    <thead>
                                        <tr>
                                            <th>Type</th>
                                            <th>Montant</th>
                                            <th>Description</th>
                                            <th>Date</th>

                                    </thead>
                                    <tbody>
                                        ${data.operations.length === 0 ? `
                                            <tr><td colspan="4" class="text-center text-muted">Aucune opération</td></tr>
                                        ` : data.operations.map(op => `
                                            <tr>
                                                <td>
                                                    <span class="badge ${op.transaction_type === 'deposit' || op.transaction_type === 'payment' ? 'badge-success' : 'badge-danger'}">
                                                        ${op.transaction_type === 'deposit' ? '📥 Dépôt' : 
                                                          op.transaction_type === 'payment' ? '💳 Paiement' : '📤 Retrait'}

                                                </td>
                                                <td>${formatNumber(op.amount)} FCFA</td>
                                                <td>${op.description || '-'}</td>

// ===== AJOUTER UN DÉPÔT =====
window.addClientDeposit = async function(clientId) {
    const amount = parseFloat(prompt('Montant du dépôt (FCFA) :'));
    if (isNaN(amount) || amount <= 0) return alert('Montant invalide');
    const description = prompt('Description :');
    
    try {
        await apiCall(`/clients/${clientId}/deposit`, 'POST', {
            amount: amount,
            description: description || 'Dépôt client'
        });
        alert('✅ Dépôt enregistré avec succès');
        viewClientOperations(clientId);
        renderClients();
    } catch(err) {
        alert('❌ Erreur: ' + err.message);
    }
};

// ===== AJOUTER UN RETRAIT =====
window.addClientWithdrawal = async function(clientId) {
    const amount = parseFloat(prompt('Montant du retrait (FCFA) :'));
    if (isNaN(amount) || amount <= 0) return alert('Montant invalide');
    const description = prompt('Description :');
    
    try {
        await apiCall(`/clients/${clientId}/withdrawal`, 'POST', {
            amount: amount,
            description: description || 'Retrait client'
        });
        alert('✅ Retrait enregistré avec succès');
        viewClientOperations(clientId);
        renderClients();
    } catch(err) {
        alert('❌ Erreur: ' + err.message);
    }
};

// ===== PAYER UNE FACTURE AVEC LE COMPTE CLIENT =====
window.payClientInvoice = async function(clientId) {
    try {
        // Récupérer les factures impayées du client
        const sales = await apiCall(`/sales?client_id=${clientId}&status=pending`);
        if (sales.length === 0) {
            return alert('✅ Aucune facture impayée pour ce client');
        }
        
        // Afficher les factures
        let options = sales.map((s, i) => 
            `${i+1}. Facture #${s.id} - ${formatNumber(s.final_amount)} FCFA (${new Date(s.sale_date).toLocaleDateString()})`
        ).join('\n');
        
        const choice = parseInt(prompt(`Choisissez une facture à payer :\n\n${options}`));
        if (isNaN(choice) || choice < 1 || choice > sales.length) return alert('Choix invalide');
        
        const sale = sales[choice - 1];
        
        if (!confirm(`Payer la facture #${sale.id} de ${formatNumber(sale.final_amount)} FCFA avec le compte client ?`)) {
            return;
        }
        
        await apiCall(`/clients/${clientId}/pay-invoice`, 'POST', {
            sale_id: sale.id
        });
        alert('✅ Facture payée avec succès');
        viewClientOperations(clientId);
        renderClients();
        if (typeof loadAllInvoices === 'function') loadAllInvoices();
    } catch(err) {
        alert('❌ Erreur: ' + err.message);
    }
};
